<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Product Details</title>

<style>
body{
  margin:0;

  font-family:Arial;

}

.container{
  text-align:center;
  padding:20px;
}

img{
  width:80%;
  max-width:350px;
  border-radius:15px;
  margin-top:10px;
}

.price{
  font-size:22px;
  margin-top:10px;
  color:#fff;
}

.order{
  display:inline-block;
  margin-top:15px;
  padding:10px 18px;
  background:#fff;
  color:#000;
  text-decoration:none;
  border-radius:8px;
  font-weight:bold;
}

.details{
  margin-top:20px;
  font-size:13px;
  color:#aaa;
  line-height:1.6;
  padding:0 15px;
}

.footer{
  margin-top:30px;
  border-top:1px solid #333;
  padding-top:15px;
  font-size:13px;
  color:#777;
}
</style>
</head>

<body>

<div class="container">

<h2 id="name"></h2>

<img src="https://via.placeholder.com/400x400?text=Tshirt">

<a class="order" href="#">ORDER NOW</a>

<div class="details">
Premium quality oversized men’s T-shirt.<br>
Soft cotton fabric, streetwear fit, long lasting print.<br>
Comfortable for daily use and fashion styling.
</div>

<div class="footer">
📍 maggona main street <br>
📞 0754668668 <br><br>

<b>Terms & Policy</b><br>
No refund after use.<br>
Exchange only within 24 hours of delivery.
</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
document.getElementById("name").innerText = params.get("name");
document.getElementById("price").innerText = "Rs. " + params.get("price");
</script>

</body>
  </html>
